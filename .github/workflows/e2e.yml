name: e2e

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/shared-types/**"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared-types/**"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # No `with: version:` — `packageManager: pnpm@x.y.z` in the root
        # package.json is the single source of truth (mirrors ci.yml + codegen.yml).

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter @auxd/web build

      - name: Install Playwright browsers
        run: pnpm --filter @auxd/web exec playwright install --with-deps chromium webkit

      - name: Start web in background
        run: pnpm --filter @auxd/web start &
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.E2E_API_URL || 'http://localhost:8000' }}

      - name: Wait for web
        run: npx wait-on --timeout 60000 http://localhost:3000

      - name: Run Playwright tests
        run: pnpm --filter @auxd/web exec playwright test
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 14
