name: deploy api

# T009 — auto-deploy auxd-api to Fly.io on push to main.
#
# Triggers ONLY when backend code, deps, Dockerfile, fly.toml, or this
# workflow itself changes — frontend pushes don't re-deploy the backend.
#
# Required GitHub secret:
#   FLY_API_TOKEN  — create with: `flyctl tokens create deploy -a auxd-api`
#                    then add at https://github.com/xiejoshua/auxd/settings/secrets

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy auxd-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        # Run from apps/api/ so flyctl auto-resolves fly.toml + Dockerfile
        # relative to the working directory (the conventional monorepo
        # pattern). -a is explicit so the deploy never relies on the
        # fly.toml-parsing path for the app name — if a future fly.toml
        # tweak ever breaks parsing again, this still routes to the right
        # Fly app.
        working-directory: apps/api
        run: flyctl deploy --remote-only -a auxd-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Post-deploy smoke test
        run: |
          # Give Fly a moment to route the new machine
          sleep 5
          for i in {1..6}; do
            status=$(curl -sS -o /dev/null -w "%{http_code}" https://api.xiejoshua.com/healthz || echo "000")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "✓ /healthz returned 200 — deploy verified"
              exit 0
            fi
            sleep 10
          done
          echo "✗ /healthz never returned 200 after 60s of polling"
          exit 1
