file-client.tsx. 4 vitest. Codegen api.ts +87 lines covering the new path. Single progressive verify checkpoint: backend ruff+format+mypy strict + pytest 867 pass / 3 skip (+17 new — 6 migration unit + 2 lifespan + 9 user-reviews); frontend Biome 131 files + tsc 0 errors + Vitest 63 pass (+4) + next build adds /profile/[handle]/reviews 5.51kB/317kB FLJS; shared FLJS unchanged at 185kB. Spied on log_call directly (NOT caplog) in lifespan tests because configure_logging strips pytest's caplog handler. 126/172 → 128/172 (74%). Both stranded tasks closed; no orphans remain in §0-§13 range. Operator follow-ups NEW: none (T030 intentionally no-op; T094 reuses existing infrastructure with zero new debt). ## Prior session details preserved below ## Session 21 (2026-05-23 night continuation — §13 Notifications close-out: T139 prefs UI + T140 inbox + bell + T141 push-subscribe). 3 frontend tasks closing the §13 cluster + 6 backing backend endpoints. Sub-agent wave: backend extended notifications/routes.py with `GET /api/v1/notifications` (cursor on `created_at|id` base64; sidecar denormalised actor_handle/display_name per row to avoid N+1; 60/min) + `GET /api/v1/notifications/unread-count` (120/min for badge poll) + `POST /api/v1/notifications/{id}/read` (owner-only, idempotent) + `POST /api/v1/notifications/mark-all-read` (10/min) + `GET /api/v1/users/me/notification-preferences` (flattens User.quiet_hours_{start,end,tz} into nested `{quiet_hours: {enabled, start, end, tz}}`) + `PUT .../notification-preferences` (IANA tz validation via zoneinfo.ZoneInfo; rejects security-email-lock with 422 `security_email_locked`). Backend model fix: `bson_encoders` for `datetime.time` added to User.Settings — would have been a P0 prod-deploy bug otherwise (caught by new integration tests). Codegen re-ran: api.ts +543 lines covering the 6 new endpoints. Frontend T139 prefs UI at /settings/notifications + components/notifications/prefs-form.tsx — per-type per-channel toggles grouped per taxo