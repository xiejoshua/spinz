# Project configuration — copy to .product-forge/config.yml in your project root
# See config-template.yml and docs/config.md for full documentation
config:
  codebase_path:
    description: "Relative path to the project codebase for static analysis"
    required: false
    default: "."
    example: "./src"

  project_name:
    description: "Project name used as context in all research agents"
    required: false
    example: "Acme Workflow"

  project_tech_stack:
    description: "Brief tech stack description passed to research agents"
    required: false
    example: "Node.js + Express + Postgres"

  project_domain:
    description: "Domain/industry for competitor and UX research context"
    required: false
    example: "B2B SaaS productivity tool"

  features_dir:
    description: "Directory where feature artifacts are stored"
    required: false
    default: "features"

  default_speckit_mode:
    description: "Default SpecKit transition mode: 'classic' or 'v-model' or 'ask'"
    required: false
    default: "ask"
