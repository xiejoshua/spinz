name: Evaluations

on:
  workflow_dispatch:
    inputs:
      run_llm_evals:
        description: "Run LLM-as-judge evaluations (requires GOOGLE_API_KEY)"
        type: boolean
        default: false
      run_e2e_evals:
        description: "Run E2E command invocation evaluations (requires GOOGLE_API_KEY)"
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 6:00 UTC

permissions:
  contents: read

jobs:
  structural-evals:
    name: Structural Evaluations (Deterministic)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run structural eval tests
        run: |
          pytest tests/evals/ -m structural -v --tb=short

  llm-evals:
    name: LLM-as-Judge Evaluations
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_llm_evals == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run LLM eval tests
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          pytest tests/evals/ -m eval -v --tb=long

  e2e-evals:
    name: E2E Command Invocation Evaluations
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_e2e_evals == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run E2E eval tests
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          pytest tests/evals/ -m e2e -v --tb=long
